services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: menuvi_backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app/public
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - menuvi_net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/nextjs/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://delivery.noddal.cloud/api}
    container_name: menuvi_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - menuvi_net

  db:
    image: mysql:8.0
    container_name: menuvi_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: night_market_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - menuvi_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - menuvi_net

  nginx:
    image: nginx:alpine
    container_name: menuvi_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage/app/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - menuvi_net

networks:
  menuvi_net:
    driver: bridge

volumes:
  menuvi_db_data:
  backend_storage:
